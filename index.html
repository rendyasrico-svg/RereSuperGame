<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Rere Super Game</title>
<link rel="stylesheet" href="style.css">

<!-- PWA Meta -->
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-fullscreen">
<meta name="apple-mobile-web-app-title" content="Rere Game">
<meta name="theme-color" content="#ffe600">

<!-- Icon -->
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="App_icon.png">
<link rel="icon" type="image/png" href="App_icon.png">
</head>
<body>

<!-- UI Skor & Nyawa -->
<div id="ui">
    <div>🪙 <span id="score">0</span></div>
    <div>❤️ <span id="life">3</span></div>
</div>

<!-- Canvas Game -->
<canvas id="game"></canvas>

<!-- Kontrol Tombol -->
<div id="controls">
    <div class="left-buttons">
        <button id="left">⬅️</button>
        <button id="right">➡️</button>
    </div>
    <div class="right-buttons">
        <button id="jump">⬆️</button>
        <button id="shoot">🔥</button>
    </div>
</div>

<!-- Overlay Game Over / Win -->
<div id="overlay">
    <div id="overlay-box">
        <div id="overlay-title">GAME OVER</div>
        <div id="overlay-score">Skor: 0</div>
        <button id="overlay-btn">Main Lagi</button>
    </div>
</div>

<!-- Loading Screen -->
<div id="loading">
    <img id="loading-img" src="intro.png" alt="Rere Super Game">
    <div id="loading-bar-wrap">
        <div id="loading-bar"></div>
    </div>
    <div id="loading-text">Memuat Game...</div>
</div>

<!-- Intro Screen -->
<div id="intro">
    <div id="intro-box">
        <div id="intro-title">
            <span class="title-rere">RERE</span>
            <span class="title-super">SUPER</span>
            <span class="title-game">GAME</span>
        </div>
        <div id="intro-sub">🌟 Petualangan Seru Dimulai! 🌟</div>
        <div id="intro-quotes">
            <p>🌟 Selamat datang, Petualang!</p>
            <p>💪 Kumpulkan semua koin & kalahkan musuh!</p>
            <p>🏁 Capai bendera untuk menang!</p>
            <p>❤️ Jaga nyawamu, jangan menyerah!</p>
        </div>
        <button id="intro-btn">▶ MULAI GAME</button>
        <div id="intro-tap">Tap layar untuk memulai musik 🎵</div>
    </div>
</div>

<!-- Tombol Gear / Pause -->
<button id="gear-btn">⚙️</button>

<!-- Pause Menu -->
<div id="pause-menu" style="display:none;">
    <div class="menu-box">
        <h2>Pengaturan</h2>
        <button id="resume-btn">▶️ Lanjutkan</button>
        <button id="sound-btn">🔊 Sound ON</button>
        <button id="restart-btn">🔄 Restart</button>
        <button id="quit-btn">🏠 Keluar</button>
    </div>
</div>
<script>
if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js")
            .then(() => console.log("SW berhasil didaftarkan"))
            .catch(err => console.log("SW gagal:", err));
    });
}
</script>

<script src="script.js"></script>
</body>
</html>
